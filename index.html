<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>白飯俱樂部 ✦ Rice Club</title>
    <meta name="description" content="白飯俱樂部 Rice Club — 沉浸式夜晚體驗" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/nav.css" />
  </head>
  <body>
    <div class="viewport">
      <div class="track" id="track">
        <section class="page" id="page-0" data-page="0">
          <div class="home-hero__content">
            <div>
              <h1 class="home-hero__title">白飯俱樂部</h1>
              <p class="home-hero__lead"><span>RICE CLUB</span></p>
            </div>
            <p
              class="home-hero__entry"
              data-nav-target="1"
              role="button"
              tabindex="0"
            >
              入內，讓情感開始交織 ⭢
            </p>
          </div>
        </section>
        <section class="page" id="page-1" data-page="1">
          <div class="home-hero__content">
            <div>
              <h1 class="home-hero__title">白飯俱樂部</h1>
              <p class="home-hero__lead"><span>RICE CLUB</span></p>
            </div>
            <div class="about-goblet-wrap">
              <img
                class="about-goblet"
                src="../背景圖片/關於酒杯.png"
                alt="關於酒杯"
              />
              <div class="about-goblet-overlay" aria-label="歡迎標語">
                <div class="about-goblet-overlay__intro">
                  <p class="about-goblet-overlay__left">歡迎來到白飯俱樂部</p>
                  <p class="about-goblet-overlay__left">
                    你要的這一口，我們都有。
                  </p>
                </div>
                <div class="about-goblet-overlay__story">
                  <p class="about-goblet-overlay__right">
                    在這裡，你不需要急著融入，
                  </p>
                  <p class="about-goblet-overlay__right">
                    只要坐下來慢慢感受今晚的節奏就好。
                  </p>
                  <p>&nbsp;</p>
                  <p class="about-goblet-overlay__right">
                    燈光、音樂、演唱表演與店員們，
                  </p>
                  <p class="about-goblet-overlay__right">
                    都會陪你一起走進這個夜晚。
                  </p>
                  <p>&nbsp;</p>
                  <p class="about-goblet-overlay__right">
                    讓這個夜晚，多一點值得記住的片刻。
                  </p>
                  <p class="about-goblet-overlay__right">
                    現在，把腳步放慢一點，
                  </p>
                  <p class="about-goblet-overlay__right">
                    剩下的，就交給白飯俱樂部。
                  </p>
                  <p
                    class="about-goblet-overlay__cta"
                    data-nav-target="2"
                    role="button"
                    tabindex="0"
                    aria-label="閱讀顧客守則"
                  >
                    ✦ 閱讀顧客守則→
                  </p>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="page" id="page-2" data-page="2">
          <div class="page-placeholder">顧客守則</div>
        </section>
        <section class="page" id="page-3" data-page="3">
          <div class="page-placeholder">店員介紹</div>
        </section>
        <section class="page" id="page-4" data-page="4">
          <div class="page-placeholder">服務內容</div>
        </section>
        <section class="page" id="page-5" data-page="5">
          <div class="page-placeholder">菜單</div>
        </section>
        <section class="page" id="page-6" data-page="6">
          <div class="page-placeholder">精彩瞬間</div>
        </section>
        <section class="page" id="page-7" data-page="7">
          <div class="page-placeholder">斗內香檳王</div>
        </section>
        <section class="page" id="page-8" data-page="8">
          <div class="page-placeholder">店內環境</div>
        </section>
      </div>
    </div>

          <path d="M12 16V12" />

        </svg>
        <span class="nav-label">關於</span>

      <!-- 顧客守則 -->

          <polygon

          />
        </svg>
        <span class="nav-label">服務內容</span>
      </button>

      <!-- 菜單 -->
      <button class="nav-item" data-target="5" aria-label="菜單">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M2 3H8C9.1 3 10 3.9 10 5V19C10 17.9 9.1 17 8 17H2V3Z" />

      <!-- 精彩瞬間 -->
      <button class="nav-item" data-target="6" aria-label="精彩瞬間">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M23 19C23 20.1 22.1 21 21 21H3C1.9 21 1 20.1 1 19V8C1 6.9 1.9 6 3 6H7L9 3H15L17 6H21C22.1 6 23 6.9 23 8V19Z"
          />

      <!-- 斗內香檳王 -->

          <path d="M8 2H16L14 12H10L8 2Z" />
          <line x1="12" y1="12" x2="12" y2="20" />
          <line x1="8" y1="20" x2="16" y2="20" />
          <line x1="7" y1="7" x2="17" y2="7" />

          <line x1="1" y1="22" x2="23" y2="22" />
          <rect x="3" y="12" width="3" height="10" />

          <rect x="18" y="12" width="3" height="10" />

      </button>

    <script src="js/nav.js"></script>
